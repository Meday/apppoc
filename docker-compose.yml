services:
  devkit:
    build: .
    volumes:
      - .:/app
      # Caches persistants entre sessions
      - cargo-cache:/root/.cargo/registry
      - pnpm-cache:/root/.local/share/pnpm
      # WSLg — accès au display Windows 11
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XDG_RUNTIME_DIR}:${XDG_RUNTIME_DIR}
    environment:
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
    network_mode: host

volumes:
  cargo-cache:
  pnpm-cache:
