name: Build Tauri App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            frankenphp_url: https://github.com/dunglas/frankenphp/releases/latest/download/frankenphp-windows-x86_64.exe
            frankenphp_bin: frankenphp-x86_64-pc-windows-msvc.exe
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            frankenphp_url: https://github.com/dunglas/frankenphp/releases/latest/download/frankenphp-linux-x86_64
            frankenphp_bin: frankenphp-x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, intl, zip

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install JS dependencies
        run: pnpm install

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install backend dependencies
        run: composer install --no-dev --no-scripts --optimize-autoloader --working-dir=backend

      - name: Download FrankenPHP sidecar
        run: |
          curl -L -o src-tauri/binaries/${{ matrix.frankenphp_bin }} ${{ matrix.frankenphp_url }}
          chmod +x src-tauri/binaries/${{ matrix.frankenphp_bin }} || true

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
